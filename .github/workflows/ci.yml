name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: trip-planner-backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff bandit
        playwright install chromium

    - name: Lint with Ruff
      run: |
        ruff check . --select=E,F,W,C,B,S --exclude=tests/,venv/,.venv/ --ignore=E501
        
    - name: Security Scan with Bandit
      run: |
        bandit -r . -x ./tests,./venv,./.venv -f txt -ll
        
    - name: Run advanced test cases (Edge & Security cases)
      env:
        GROQ_API_KEY: "dummy_key"
        OPENWEATHER_API_KEY: "dummy_key"
        LITEAPI_API_KEY: "dummy_key"
        SUPABASE_URL: "https://dummy.supabase.co"
        SUPABASE_KEY: "dummy_key"
        ADMIN_SECRET: "dummy_secret"
      run: |
        pytest tests/test_edge_cases.py -v
